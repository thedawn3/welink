# WeLink 配置文件
# 本文件适用于本地运行和 Docker 场景。
# 配置优先级：默认值 < config.yaml < 容器环境变量。

server:
  port: "8080"

data:
  # 解密后的微信数据根目录。
  # 本地开发建议使用相对路径；Docker 场景会由 compose 覆盖为 /app/data。
  dir: "./decrypted"

  # 微信媒体资源目录（图片/视频/文件等），可留空。
  # Docker 场景会由 compose 覆盖为 /app/msg。
  msg_dir: ""

analysis:
  timezone: "Asia/Shanghai"
  late_night_start_hour: 0
  late_night_end_hour: 5
  session_gap_seconds: 21600
  worker_count: 4
  late_night_min_messages: 100
  late_night_top_n: 20
  default_init_from: 0
  default_init_to: 0
