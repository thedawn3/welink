services:
  backend:
    image: ghcr.io/runzhliu/welink/backend:main
    build: ./backend
    container_name: welink-backend-demo
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - WELINK_DEMO_MODE=true
      - DEMO_MODE=true
      - WELINK_DATA_DIR=/app/demo-data
      - DATA_DIR=/app/demo-data

  frontend:
    image: ghcr.io/runzhliu/welink/frontend:main
    build: ./frontend
    container_name: welink-frontend-demo
    ports:
      - "3000:80"
    depends_on:
      - backend
