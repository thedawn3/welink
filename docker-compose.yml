services:
  backend:
    image: ghcr.io/runzhliu/welink/backend:main
    build: ./backend
    container_name: welink-backend
    ports:
      - "${WELINK_BACKEND_PORT:-8080}:8080"
    volumes:
      - ${WELINK_DATA_DIR:-./decrypted}:/app/data:ro
      - ${WELINK_MSG_DIR:-./.tmp/welink-empty-msg}:/app/msg:ro
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - GIN_MODE=${WELINK_GIN_MODE:-release}
      - WELINK_DATA_DIR=/app/data
      - WELINK_MSG_DIR=/app/msg
      - DATA_DIR=/app/data
      - MSG_DIR=/app/msg

  frontend:
    image: ghcr.io/runzhliu/welink/frontend:main
    build: ./frontend
    container_name: welink-frontend
    ports:
      - "${WELINK_FRONTEND_PORT:-3000}:80"
    volumes:
      - ${WELINK_MSG_DIR:-./.tmp/welink-empty-msg}:/usr/share/nginx/html/wechat-msg:ro
    depends_on:
      - backend
